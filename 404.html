<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 — Insanity Shop</title>
  <link rel="icon" href="favicon.svg" type="image/svg+xml">
  <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="shared.css">
  <style>
    .notfound {
      min-height:100vh; display:flex; flex-direction:column;
      justify-content:center; align-items:center; text-align:center;
      padding:40px; position:relative; z-index:1;
    }
    .big-num {
      font-size:clamp(6rem,20vw,12rem); font-weight:800; line-height:1;
      background:linear-gradient(135deg,#c026d3,#a855f7);
      -webkit-background-clip:text; -webkit-text-fill-color:transparent;
      animation:pulse 2.4s ease-in-out infinite;
    }
    @keyframes pulse { 0%,100%{filter:drop-shadow(0 0 20px rgba(192,38,211,0.4));}
      50%{filter:drop-shadow(0 0 50px rgba(192,38,211,0.8));} }
    h2 { font-size:1.6rem; font-weight:700; margin:16px 0 10px; color:#e0b0ff; }
    p  { color:var(--muted); margin-bottom:32px; }
    .btn-home {
      padding:14px 44px; background:linear-gradient(90deg,#c026d3,#a855f7);
      color:#fff; border-radius:50px; font-size:1rem; font-weight:700;
      text-decoration:none; transition:transform 0.15s;
    }
    .btn-home:hover { transform:scale(1.04); }
  </style>
</head>
<body>
<div id="snow"></div>
<div class="notfound">
  <div class="big-num">404</div>
  <h2>Page introuvable</h2>
  <p>Cette page n'existe pas ou a été déplacée.</p>
  <a href="index.html" class="btn-home">← Retour à l'accueil</a>
</div>
<script src="config.js"></script>
<script src="shared.js"></script>
</body>
</html>
